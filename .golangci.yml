version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/jhseoeo/fiber-skeleton

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - bodyclose
    - noctx
    - revive
    - godot
  settings:
    revive:
      rules:
        - name: exported
          disabled: true
    godot:
      scope: declarations
      capital: false
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - bodyclose
